<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#df111f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="选你妹" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>选你妹</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-180.png" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="decision-board" aria-labelledby="app-title">
        <header class="masthead">
          <div class="receipt-topline">
            <span>RECEIPT</span>
            <span>No. 250602</span>
          </div>
          <p class="eyebrow">CHOICE MARKET</p>
          <h1 id="app-title">选你妹</h1>
          <p class="subtitle">把纠结打成一张小票，撕下来就按它办。</p>
        </header>

        <div class="visual-guide" aria-hidden="true">
          <div class="guide-ticket">
            <div class="ticket-notch"></div>
            <svg viewBox="0 0 240 150" role="img">
              <path class="rain" d="M38 16v20M68 10v18M104 18v22M144 10v20M184 18v22M210 10v18" />
              <path class="cloud" d="M42 62c16-22 46-22 62 0 18-19 50-16 60 4 16-10 40-2 46 18H28c4-10 9-16 14-22z" />
              <path class="city" d="M40 100h18V78h18v22h22V70h24v30h18V84h20v16h18V76h22v24" />
              <path class="ground" d="M24 116h192" />
            </svg>
            <div class="mini-barcode"></div>
          </div>
        </div>

        <form class="chooser" id="chooser-form">
          <div class="dashed-rule"></div>
          <label class="field-label" for="choices">ITEMS / 候选项</label>
          <textarea
            id="choices"
            name="choices"
            rows="7"
            placeholder="火锅&#10;烧烤&#10;麻辣烫"
            autocomplete="off"
            spellcheck="false"
          ></textarea>

          <div class="action-row">
            <button class="primary-button" type="submit">
              <span>PRINT MY CHOICE</span>
            </button>
            <button class="icon-button" id="clear-button" type="button" aria-label="清空">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M4 7h16" />
                <path d="M10 11v6" />
                <path d="M14 11v6" />
                <path d="M6 7l1 14h10l1-14" />
                <path d="M9 7V4h6v3" />
              </svg>
            </button>
          </div>
        </form>

        <section class="result-panel" aria-live="polite">
          <div class="dashed-rule"></div>
          <p class="result-label">TOTAL / 最终选择</p>
          <div class="result-text" id="result-text">未开签</div>
          <div class="result-meta" id="result-meta">至少写两个选项。</div>
          <div class="barcode" aria-hidden="true"></div>
        </section>
      </section>

      <aside class="history-panel" aria-labelledby="history-title">
        <div class="panel-title-row">
          <h2 id="history-title">RECENT PRINTS</h2>
          <button class="text-button" id="history-clear-button" type="button">清除</button>
        </div>
        <ol class="history-list" id="history-list"></ol>
      </aside>
    </main>

    <template id="history-item-template">
      <li>
        <span class="history-choice"></span>
        <time class="history-time"></time>
      </li>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
